<div class="mb-6 px-4 py-1.5 rounded-full bg-secondary-fixed/20 text-secondary font-label text-xs uppercase tracking-widest flex items-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-secondary"></span>

            </div>

<span class="text-primary italic">Complete</span>
</h1>
<!-- Summary Visualization (Asymmetric Editorial Style) -->
<div class="w-full grid grid-cols-1 md:grid-cols-3 gap-8 mb-16 text-left items-end">
<!-- Matched -->
<div class="group border-l-2 border-outline-variant/30 pl-6 py-4 transition-all hover:border-primary">
<p class="font-body text-on-surface-variant text-sm mb-1 uppercase tracking-wider">Total Matched</p>
<div class="flex items-baseline gap-2">
<span class="font-headline text-5xl font-bold text-on-surface">$2.4M</span>
<span class="font-label text-secondary text-xs">MATCHED</span>
</div>
</div>
<!-- Missing -->
<div class="group border-l-2 border-outline-variant/30 pl-6 py-4 transition-all hover:border-primary">

<div class="flex items-baseline gap-2">
<span class="font-headline text-5xl font-bold text-on-surface">$12.4K</span>
<span class="font-label text-error text-xs">ABSENT</span>

</div>

<span class="material-symbols-outlined" data-icon="ios_share">ios_share</span>

                </button>
